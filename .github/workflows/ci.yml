name: CI

# Runtime CI for the batuta-agent-skills plugin (v3.3+).
# Two jobs:
#   1. static-validators — fast, deterministic, no secrets. Always runs.
#   2. e2e               — drives `claude --print --model sonnet` against
#                          sandbox repos. Skipped if ANTHROPIC_API_KEY secret
#                          is not set on the repo (so a fresh fork's CI does
#                          not fail before the operator wires up the key).
#
# Cost note: each PR that has the secret set spends real Anthropic API tokens
# on the e2e job (3 sonnet rounds, ~few thousand tokens total). The e2e job is
# the operator's gate against plugin-behavior regressions on the medium model;
# if cost becomes a concern, gate it on a `ci-e2e` PR label or move to
# `workflow_dispatch` only.

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs on the same ref to save tokens when commits land
# rapidly during a slice.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # GATE A — static validators. The same suite the audit chain runs against
  # every PR (`bash tests/v2.5-validators/run.sh`). 9 cases, ~seconds, no API.
  # -------------------------------------------------------------------------
  static-validators:
    name: Static contract validators (9 cases)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # validators read git diff against HEAD; full history is cheap on a small repo

      - name: Install jq (required by validators 06 + e2e scenario 01)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y jq
          fi
          jq --version

      - name: Run static validators
        run: bash tests/v2.5-validators/run.sh

  # -------------------------------------------------------------------------
  # GATE B — end-to-end harness driving claude --print --model sonnet. Spends
  # real API tokens. Skipped when ANTHROPIC_API_KEY is not set on the repo.
  # -------------------------------------------------------------------------
  e2e:
    name: E2E harness (claude --model sonnet, 4 scenarios)
    runs-on: ubuntu-latest
    needs: static-validators  # don't burn tokens on a tree the static suite already rejected
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Probe ANTHROPIC_API_KEY presence
        id: probe
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${KEY}" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret not set; e2e harness will be skipped"
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "ANTHROPIC_API_KEY is set; e2e harness will run"
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.probe.outputs.has_key == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        if: steps.probe.outputs.has_key == 'true'
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Install jq
        if: steps.probe.outputs.has_key == 'true'
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y jq
          fi

      - name: Run E2E harness
        if: steps.probe.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash tests/e2e/run.sh

      - name: E2E summary on skip
        if: steps.probe.outputs.has_key == 'false'
        run: |
          echo "E2E harness was skipped because ANTHROPIC_API_KEY is not set."
          echo "To enable runtime testing of plugin behavior on PRs:"
          echo "  Settings → Secrets and variables → Actions → New repository secret"
          echo "  Name: ANTHROPIC_API_KEY"
          echo "  Value: <your Anthropic API key>"
          echo "Static validators (above) ran and provide the contract-level signal."
