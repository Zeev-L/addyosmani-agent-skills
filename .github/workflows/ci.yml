name: CI

# Runtime CI for the batuta-agent-skills plugin (v3.3+; supply-chain hardened in v3.4+).
# Three jobs:
#   1. actionlint        — lints every .github/workflows/*.yml file. Catches YAML drift
#                          before it lands in main. ~seconds, no secrets.
#   2. static-validators — fast, deterministic, no secrets. Always runs. Now also runs
#                          the API-free E2E scenario 01 (engines-state roundtrip) so
#                          fork PRs (no ANTHROPIC_API_KEY) still get behavioral coverage
#                          on at least one scenario.
#   3. e2e               — drives `claude --print --model sonnet` against sandbox repos.
#                          Skipped if ANTHROPIC_API_KEY secret is not set on the repo
#                          (so a fresh fork's CI does not fail before the operator wires
#                          up the key).
#
# Cost note: each PR that has the secret set spends real Anthropic API tokens on the
# e2e job (3 sonnet rounds, ~few thousand tokens total). If cost becomes a concern,
# gate it on a `ci-e2e` PR label or move to `workflow_dispatch` only.
#
# Supply-chain v3.4+:
#   - Third-party actions are pinned by full commit SHA with a `# vX.Y.Z` comment.
#     Pinning by tag (`@v6`) is convenient but mutable: a maintainer can re-tag.
#     Pinning by SHA is immutable. The comment preserves the human-readable version.
#     References: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
#   - Claude Code CLI is pinned to a specific npm version. Latest-on-CI invites silent
#     drift between PRs; pin + manual bump aligns with the rest of the supply-chain
#     posture (codebase-memory-mcp release pin, graphifyy version pin).

on:
  # `pull_request` (NOT `pull_request_target`) — fork PRs run in fork context with no
  # secret access. The probe step in the `e2e` job correctly skips on fork PRs.
  # `pull_request_target` would expose maintainer secrets to fork code; intentionally
  # avoided.
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs on the same ref to save tokens when commits land
# rapidly during a slice.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # GATE 0 — actionlint. Lints every workflow YAML file. Catches drift before
  # it lands in main (e.g. malformed `if:` expressions, undeclared inputs,
  # action that no longer exists). ~seconds. No secrets needed.
  # -------------------------------------------------------------------------
  actionlint:
    name: Lint workflow YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # raven-actions/actionlint is a wrapper around the canonical
      # rhysd/actionlint binary; chosen for the PR-annotation UX. SHA pin makes
      # the trust decision a one-time review (see audit chain v3.4 GATE 3).
      # Migrate to rhysd's own action if/when one ships.
      - uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

  # -------------------------------------------------------------------------
  # GATE A — static validators + API-free E2E scenario 01. The static suite is
  # the same the audit chain runs against every PR (`bash tests/v2.5-validators/run.sh`).
  # Scenario 01 (engines-state roundtrip) is API-free, so we run it here too —
  # closes the v3.3 fork-CI coverage gap (fork PRs without the secret still get
  # behavioral coverage on one scenario).
  # -------------------------------------------------------------------------
  static-validators:
    name: Static contract validators (9 cases) + scenario 01
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # validators read git diff against HEAD; full history is cheap on a small repo

      - name: Install jq (required by validator 06 + e2e scenario 01)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y jq
          fi
          jq --version

      - name: Run static validators
        run: bash tests/v2.5-validators/run.sh

      - name: Run API-free E2E scenario 01 (engines-state roundtrip)
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: bash tests/e2e/scenarios/01-engines-state-roundtrip.sh

  # -------------------------------------------------------------------------
  # GATE B — end-to-end harness driving claude --print --model sonnet. Spends
  # real API tokens. Skipped when ANTHROPIC_API_KEY is not set on the repo.
  # -------------------------------------------------------------------------
  e2e:
    name: E2E harness (claude --model sonnet, 4 scenarios)
    runs-on: ubuntu-latest
    # Don't burn API tokens on a tree where YAML or contracts are broken.
    # Both gates (actionlint, static-validators) must pass first.
    needs: [actionlint, static-validators]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Probe ANTHROPIC_API_KEY presence
        id: probe
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${KEY}" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret not set; e2e harness will be skipped"
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "ANTHROPIC_API_KEY is set; e2e harness will run"
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.probe.outputs.has_key == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI (pinned)
        if: steps.probe.outputs.has_key == 'true'
        # Pinned to the version verified during the v3.2 + v3.3 work. Bump deliberately
        # via a fix-up PR after re-running tests/e2e/run.sh locally.
        run: |
          npm install -g @anthropic-ai/claude-code@2.1.123
          claude --version

      - name: Install jq
        if: steps.probe.outputs.has_key == 'true'
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y jq
          fi

      - name: Run E2E harness
        if: steps.probe.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash tests/e2e/run.sh

      - name: E2E summary on skip
        if: steps.probe.outputs.has_key == 'false'
        run: |
          echo "E2E harness was skipped because ANTHROPIC_API_KEY is not set."
          echo "To enable runtime testing of plugin behavior on PRs:"
          echo "  Settings → Secrets and variables → Actions → New repository secret"
          echo "  Name: ANTHROPIC_API_KEY"
          echo "  Value: <your Anthropic API key>"
          echo "Static validators + API-free scenario 01 ran above; they provide the"
          echo "contract-level signal even on fork PRs without the secret."
