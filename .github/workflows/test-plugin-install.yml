name: Test Plugin Installation

# Validates the plugin manifest and the install path via `claude plugin install`.
# Inherited from the upstream addyosmani/agent-skills fork; updated in v3.4 to use
# the correct fork plugin identifier (`batuta-agent-skills@batuta-agent-skills`)
# and to pin third-party actions + the Claude CLI version, matching the supply-chain
# posture of `.github/workflows/ci.yml`.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Claude Code CLI (pinned)
        run: npm install -g @anthropic-ai/claude-code@2.1.123

      - name: Validate marketplace and plugin manifests
        run: claude plugin validate .

  test-install:
    name: Test plugin installation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Claude Code CLI (pinned)
        run: npm install -g @anthropic-ai/claude-code@2.1.123

      - name: Configure git to use HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Add marketplace
        run: claude plugin marketplace add ./

      - name: List marketplaces
        run: claude plugin marketplace list

      - name: Install plugin
        run: claude plugin install batuta-agent-skills@batuta-agent-skills --scope user
